# The mapping definitions are topological ordered based on the container constraints of the
# destination views. CogniteMaintenanceOrder is migrated first since CogniteOperation and
# CogniteNotification hold direct relations to it.
- externalId: APMActivityToMaintenanceOrderMapping
  sourceView:
    space: APM_SourceData
    externalId: APM_Activity
    version: '1'
    type: view
  destinationView:
    space: cdf_idm
    externalId: CogniteMaintenanceOrder
    version: v1
    type: view
  mapIdenticalIdProperties: true
  containerMapping:
    id: sourceId
    title: name
    startTime: scheduledStartTime
    endTime: scheduledEndTime
    actualStartTime: startTime
    actualEndTime: endTime
    assetExternalId: mainAsset
    node.createdTime: sourceCreatedTime
    node.lastUpdatedTime: sourceUpdatedTime
  ignoreSourceProperties:
    - rootLocation
    - source
    - cloneOf
    - isMutated
    - mutatedFields
- externalId: APMOperationToOperationMapping
  sourceView:
    space: APM_SourceData
    externalId: APM_Operation
    version: '1'
    type: view
  destinationView:
    space: cdf_idm
    externalId: CogniteOperation
    version: v1
    type: view
  mapIdenticalIdProperties: true
  containerMapping:
    id: sourceId
    title: name
    order: sequence
    mainResource: mainDiscipline
    numberOfMainResource: numberOfMainDiscipline
    parentActivityId: maintenanceOrder
    labels: tags
    assetExternalId: mainAsset
    startTime: scheduledStartTime
    endTime: scheduledEndTime
    node.createdTime: sourceCreatedTime
    node.lastUpdatedTime: sourceUpdatedTime
  ignoreSourceProperties:
    - cloneOf
    - source
- externalId: APMNotificationToNotificationMapping
  sourceView:
    space: APM_SourceData
    externalId: APM_Notification
    version: '1'
    type: view
  destinationView:
    space: cdf_idm
    externalId: CogniteNotification
    version: v1
    type: view
  mapIdenticalIdProperties: true
  containerMapping:
    id: sourceId
    title: name
    assetExternalId: asset
    createdDate: sourceCreatedTime
    node.lastUpdatedTime: sourceUpdatedTime
